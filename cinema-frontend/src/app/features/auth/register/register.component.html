<app-shared-card title="Crear cuenta">
  <app-shared-form [fields]="fields" submitLabel="Registrar" [loading]="loading" (onSubmit)="onSubmit($event)"></app-shared-form>
  @if (errorMessage) {
    <p class="register-note error-message">{{ errorMessage }}</p>
  }
  <p class="register-note">¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
</app-shared-card>
