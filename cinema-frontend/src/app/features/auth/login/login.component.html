<section class="login-shell surface-card">
  <aside class="login-brand-panel">
    <img class="login-logo" src="/logo-cinema.svg" alt="Cinema logo" />
    <h1>Cinema Frontend</h1>
    <p>Gestión moderna de cartelera, sedes, tickets y reportes.</p>
  </aside>

  <div class="login-form-panel">
    <app-shared-card title="Iniciar sesión" footer="Acceso seguro al sistema">
      <app-shared-form [fields]="fields" submitLabel="Entrar" [loading]="loading" (onSubmit)="onSubmit($event)"></app-shared-form>
      <p class="login-note">żNo tienes cuenta? <a routerLink="/register">Regístrate</a></p>
    </app-shared-card>
  </div>
</section>
