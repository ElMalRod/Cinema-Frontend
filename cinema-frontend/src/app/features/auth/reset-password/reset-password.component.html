<app-shared-card title="Restablecer contraseña" footer="Define una nueva contraseña segura">
  <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
    <label for="newPassword">Nueva contraseña</label>
    <input id="newPassword" type="password" pInputText formControlName="newPassword" placeholder="Mínimo 8 caracteres" />

    <label for="confirmPassword">Confirmar contraseña</label>
    <input id="confirmPassword" type="password" pInputText formControlName="confirmPassword" placeholder="Repite la contraseña" />

    <small class="error" *ngIf="form.controls['newPassword'].touched && form.controls['newPassword'].invalid">
      La contraseña debe tener al menos 8 caracteres.
    </small>
    <small class="error" *ngIf="form.controls['confirmPassword'].touched && !passwordsMatch()">
      Las contraseñas no coinciden.
    </small>

    <button pButton type="submit" [disabled]="loading" [label]="loading ? 'Actualizando...' : 'Cambiar contraseña'"></button>
  </form>

  <p class="error" *ngIf="error">{{ error }}</p>
  <p class="ok" *ngIf="success">Contraseña actualizada. Redirigiendo a login...</p>
  <p class="link-row"><a routerLink="/login">Volver a login</a></p>
</app-shared-card>
