<app-shared-card title="Recuperar contraseña" footer="Te enviaremos un enlace a tu correo">
  <form [formGroup]="form" (ngSubmit)="requestRecovery()" class="auth-form">
    <label for="email">Correo</label>
    <input id="email" type="email" pInputText formControlName="email" placeholder="usuario@correo.com" />

    <small class="error" *ngIf="form.controls['email'].touched && form.controls['email'].invalid">
      Ingresa un correo válido.
    </small>

    <button pButton type="submit" [disabled]="loading" [label]="loading ? 'Enviando...' : 'Enviar enlace'"></button>
  </form>

  <p class="info" *ngIf="submitted">
    Si el correo existe, te enviamos un enlace para restablecer tu contraseña.
  </p>
  <p class="link-row"><a routerLink="/login">Volver a login</a></p>
</app-shared-card>
