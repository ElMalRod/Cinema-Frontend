<p-dialog
  [header]="title"
  [visible]="visible"
  (visibleChange)="onVisibleChange($event)"
  [style]="{ width: width }"
  [modal]="true"
  [closable]="true"
  [dismissableMask]="true"
  [closeOnEscape]="true"
  [draggable]="false"
  [resizable]="false"
  appendTo="body">
  <ng-content></ng-content>
</p-dialog>
